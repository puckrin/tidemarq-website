<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Tile background: light-context colour per style guide -->
  <rect width="32" height="32" rx="5" fill="#0E5F6E"/>
  <!-- Four horizontal bars, left-anchored.
       Width cascade (bottom→top): 100% / 75% / 50% / 28% of 26px usable width.
       Opacity cascade (bottom→top): 100% / 75% / 50% / 28% per style guide. -->
  <!-- Bar 4 — bottom: widest, full opacity -->
  <rect x="3" y="25" width="26" height="3" rx="1.5" fill="#E0F4F7" opacity="1"/>
  <!-- Bar 3 -->
  <rect x="3" y="18" width="20" height="3" rx="1.5" fill="#E0F4F7" opacity="0.75"/>
  <!-- Bar 2 -->
  <rect x="3" y="11" width="13" height="3" rx="1.5" fill="#E0F4F7" opacity="0.50"/>
  <!-- Bar 1 — top: shortest, most transparent -->
  <rect x="3" y="4"  width="7"  height="3" rx="1.5" fill="#E0F4F7" opacity="0.28"/>
</svg>
